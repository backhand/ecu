# ECU control-plane secrets.
#
# DO NOT commit real values. This file is a TEMPLATE: the CHANGE_ME placeholders
# document the required keys. In a real cluster, create the secret out-of-band
# instead of applying this file, e.g.:
#
#   kubectl create secret generic ecu-secrets \
#     --from-literal=ECU_API_KEY="$(openssl rand -hex 32)" \
#     --from-literal=ECU_HCLOUD_TOKEN="<hetzner-cloud-api-token>" \
#     --from-literal=ECU_SIGNING_KEY="$(openssl rand -hex 32)"
#
# Keys:
#   ECU_API_KEY      bootstrap admin API key (seeded as an active admin key).
#   ECU_HCLOUD_TOKEN Hetzner Cloud API token used to provision instances.
#   ECU_SIGNING_KEY  HMAC secret for short-lived live-watch view tokens. Optional
#                    for the app (it generates a random key if unset), but set a
#                    stable value so watch URLs survive a pod restart.
apiVersion: v1
kind: Secret
metadata:
  name: ecu-secrets
  labels:
    app: ecu-controlplane
type: Opaque
stringData:
  ECU_API_KEY: "CHANGE_ME"
  ECU_HCLOUD_TOKEN: "CHANGE_ME"
  ECU_SIGNING_KEY: "CHANGE_ME"
