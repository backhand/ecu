<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ECU — Easy Computer Use</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f5f7;
    color: #1c1e21;
  }
  .card {
    box-sizing: border-box;
    width: 100%;
    max-width: 26rem;
    margin: 1.5rem;
    padding: 2rem;
    background: #fff;
    border: 1px solid #e3e5e8;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
  }
  h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
  p { margin: 0 0 1rem; line-height: 1.45; color: #444; }
  .host {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    color: #555;
    word-break: break-all;
  }
  label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; }
  input {
    box-sizing: border-box;
    width: 100%;
    padding: 0.6rem 0.7rem;
    font-size: 1rem;
    border: 1px solid #c8cbd0;
    border-radius: 8px;
    margin-bottom: 1rem;
  }
  input:focus { outline: 2px solid #2563eb; outline-offset: 0; border-color: #2563eb; }
  button {
    width: 100%;
    padding: 0.65rem 1rem;
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    background: #2563eb;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #1d4ed8; }
  button:disabled { background: #9aa6c4; cursor: default; }
  .status { margin: 0.9rem 0 0; min-height: 1.25rem; font-size: 0.9rem; }
  .status.error { color: #c0152f; }
  .status.busy { color: #555; }
  @media (prefers-color-scheme: dark) {
    body { background: #18191b; color: #e4e6eb; }
    .card { background: #242526; border-color: #3a3b3c; box-shadow: none; }
    p { color: #b0b3b8; }
    .host { color: #b0b3b8; }
    input { background: #18191b; border-color: #4a4b4d; color: #e4e6eb; }
  }
</style>
</head>
<body>
<main class="card">
  <h1>ECU — Easy Computer Use</h1>
  <p>Download a preconfigured computer-use skill for this control plane — its
  URL and your API key are baked in, so it works with no setup.</p>
  <p class="host">Control plane: <span id="host">this control plane</span></p>
  <label for="key">API key</label>
  <input id="key" type="password" autocomplete="off" spellcheck="false"
    placeholder="your ECU API key">
  <button id="download" type="button">Download skill</button>
  <p id="status" class="status" role="status" aria-live="polite"></p>
</main>
<script>
  // Show which control plane this page configures, read from the live URL so
  // there is nothing server-rendered to keep in sync.
  document.getElementById("host").textContent = location.host;

  var keyInput = document.getElementById("key");
  var button = document.getElementById("download");
  var status = document.getElementById("status");

  function setStatus(message, kind) {
    status.textContent = message;
    status.className = "status" + (kind ? " " + kind : "");
  }

  function download() {
    var key = keyInput.value.trim();
    if (!key) {
      setStatus("Enter your API key first.", "error");
      keyInput.focus();
      return;
    }
    button.disabled = true;
    setStatus("Building…", "busy");
    // The page itself carries no secret; the key is sent only here, as a Bearer
    // token, to fetch the zip the control plane bakes it into.
    fetch("/skill.zip", { headers: { Authorization: "Bearer " + key } })
      .then(function (resp) {
        if (resp.status === 401) {
          setStatus("Invalid API key.", "error");
          return null;
        }
        if (!resp.ok) {
          setStatus("Download failed. Please try again.", "error");
          return null;
        }
        return resp.blob();
      })
      .then(function (blob) {
        if (!blob) return;
        // Turn the response into a real file download named for the skill.
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "ecu-computer-use.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus("Downloaded ecu-computer-use.zip.");
      })
      .catch(function () {
        setStatus("Download failed. Please try again.", "error");
      })
      .finally(function () {
        button.disabled = false;
      });
  }

  button.addEventListener("click", download);
  // Pressing Enter in the key field submits, like a tiny form.
  keyInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") download();
  });
</script>
</body>
</html>
