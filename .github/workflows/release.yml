name: release

# Publishes everything a tagged release needs:
#   * the `ecu` binaries (linux/darwin x amd64/arm64) + install.sh + checksums
#     -> GitHub Release assets. install.sh and the instance cloud-init fetch from
#        https://github.com/<owner>/ecu/releases/latest/download/ecu-<os>-<arch>
#   * ghcr.io/<owner>/ecu-controlplane -> the container/k3s control-plane image
#   * ghcr.io/<owner>/ecu-image        -> the computer-use INSTANCE image each
#     disposable session boots (cloud-init `docker run`s ecu-image:latest)
#
# Trigger:  git tag v0.1.0 && git push origin v0.1.0
# A pre-release-style tag (contains a '-', e.g. v0.1.0-rc1) is marked prerelease
# but STILL updates :latest, so the cloud-init `:latest` pull resolves while testing.
#
# FIRST-RUN GOTCHA — ghcr packages are PRIVATE on first push. A disposable
# instance pulls ghcr.io/<owner>/ecu-image:latest with NO credentials, so after
# the first successful run make that package PUBLIC:
#   GitHub -> Packages -> ecu-image -> Package settings -> Change visibility -> Public
# (same for ecu-controlplane if anything pulls it unauthenticated).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the Release + upload assets
  packages: write # push images to ghcr

jobs:
  binaries:
    name: Binaries + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cross-compile (make cross -> dist/ecu-<os>-<arch>)
        run: make cross
      - name: Stage installer + checksums
        run: |
          cp install.sh dist/
          ( cd dist && sha256sum ecu-* install.sh > SHA256SUMS )
          ls -l dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ecu-*
            dist/install.sh
            dist/SHA256SUMS
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  controlplane-image:
    name: Control-plane image -> ghcr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ecu-controlplane
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  instance-image:
    name: Instance (computer-use) image -> ghcr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free runner disk (the Anthropic base image is large, ~4.5 GB)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ecu-image
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./image
          file: ./image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
